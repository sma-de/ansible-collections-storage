---

  - block:

      - set_fact:
          _tmp_venv_tasks: >-
             {{ role_path }}/tasks/handle_s3_buckets/venv_tasks.yml

      - ansible.builtin.include_role:
          name: smabot.base.run_inside_venv
        vars:
          smabot_base_run_inside_venv_cfg:
            pip:

              ## pip packages needed by amazon aws modules
              extra_packages:
                - botocore
                - boto3

            tasks: >-
              {{ _tmp_venv_tasks }}

    ## ## TODO: make this configurable!!
    ## delegate_to: localhost
    ## become: no

